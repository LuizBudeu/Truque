<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Truqué</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@400;500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/board.css" />
    <link rel="stylesheet" href="css/cards.css" />
  </head>
  <body>
    <!-- Drawn once, referenced from CSS and markup. #deckle is what gives
         .vellum its torn edge; #swords is the crest on the entry proclamation.
         These live here, not in render.js, so the renderers stay pure
         model → HTML-string functions with no document to depend on. -->
    <svg width="0" height="0" style="position: absolute" aria-hidden="true">
      <defs>
        <filter id="deckle" x="-6%" y="-8%" width="112%" height="116%">
          <feTurbulence type="fractalNoise" baseFrequency="0.028" numOctaves="4" seed="7" result="n" />
          <feDisplacementMap in="SourceGraphic" in2="n" scale="9" xChannelSelector="R" yChannelSelector="G" />
        </filter>
        <symbol id="swords" viewBox="0 0 24 24">
          <path d="M3 3.5 15.5 19M21 3.5 8.5 19" stroke="currentColor" stroke-width="1.8" fill="none" />
          <path d="M13.6 17.4 17.6 21M10.4 17.4 6.4 21" stroke="currentColor" stroke-width="2.6" fill="none" />
        </symbol>
      </defs>
    </svg>

    <main id="app"></main>
    <noscript>Truqué needs JavaScript to run.</noscript>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
